---
name: Checkov

on:
  push:
    branches:
      - main

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.9
        uses: actions/setup-python@v4
        with:
          python-version: "3.9"

      - name: Test with Checkov
        id: checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: terraform_azure,terraform_ci
          framework: terraform

  trigger-jenkins:
    runs-on: ubuntu-latest
    needs: scan          # ← chỉ chạy khi job scan thành công
    steps:
      - name: Trigger Jenkins webhook
        run: |
          curl -f -X POST "${{ secrets.JENKINS_WEBHOOK_URL }}" \
            --data-urlencode "json={}" \
            --max-time 30
