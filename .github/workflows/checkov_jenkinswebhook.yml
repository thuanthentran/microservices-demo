name: Checkov

on:
  push:
    branches:
      - main

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.9
        uses: actions/setup-python@v4
        with:
          python-version: "3.9"

      - name: Checkov scan terraform_ci
        id: checkov_ci
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: terraform_ci
          framework: terraform
