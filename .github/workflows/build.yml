name: Build

on:
  push:
    branches:
      - main

jobs:
  build:
    name: Build and analyze
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # setup runtimes phổ biến
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # compile tất cả microservices (auto-detect)
      - name: Build services
        run: |
          echo "Building all services..."
          for dir in src/*; do
            echo "Checking $dir"

            if [ -f "$dir/pom.xml" ]; then
              echo "→ Maven build"
              (cd $dir && mvn -B -q clean package -DskipTests)

            elif [ -f "$dir/build.gradle" ]; then
              echo "→ Gradle build"
              (cd $dir && chmod +x gradlew && ./gradlew build -x test -x verifyGoogleJavaFormat)

            elif [ -f "$dir/package.json" ]; then
              echo "→ Node build"
              (cd $dir && npm install && npm run build || true)

            elif [ -f "$dir/go.mod" ]; then
              echo "→ Go build"
              (cd $dir && go build ./...)

            elif [ -f "$dir/requirements.txt" ]; then
              echo "→ Python install deps"
              (cd $dir && pip install -r requirements.txt)

            else
              echo "→ skip"
            fi
          done

      # sonar scan
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      # fail pipeline nếu quality gate fail
      - name: SonarQube Quality Gate
        uses: SonarSource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}